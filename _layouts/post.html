---
layout: default
---
<article class="blog-post">
    <header class="blog-post-header">
        <h1 class="blog-post-title">{{ page.title }}</h1>
        <div class="blog-post-meta">
            <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
            {% if page.tags and page.tags.size > 0 %}
            <span class="blog-post-tags">
                {% for tag in page.tags %}<span class="blog-tag">#{{ tag }}</span>{% endfor %}
            </span>
            {% endif %}
        </div>
        {% if page.description %}
        <p class="blog-post-description">{{ page.description }}</p>
        {% endif %}
    </header>

    <div class="blog-post-body prose">
        {{ content }}
    </div>

    <footer class="blog-post-footer">
        <a class="cta-button cta-secondary" href="/blog/">← Back to blog</a>
    </footer>
</article>
