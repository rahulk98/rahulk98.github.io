<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2C109RKXQE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-2C109RKXQE');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">

    <link rel="preload" href="/assets/css/styles.css" as="style">
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" as="style">

    <link rel="stylesheet" href="/assets/css/styles.css?v=20260412v1">
    <link rel="stylesheet" href="/assets/css/blog.css?v=20260412v1">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap">

    <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="/feed.xml">

    <script>
        (function () {
            try {
                var saved = localStorage.getItem('theme');
                var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                var theme = saved || (prefersDark ? 'dark' : 'light');
                var root = document.documentElement;
                root.classList.remove('light', 'dark');
                root.classList.add(theme === 'light' ? 'light' : 'dark');
            } catch (e) {}
        })();
    </script>
</head>
<body class="blog-body">
    <header class="header">
        <div class="container">
            <nav class="nav">
                <ul class="nav-list" role="menu">
                    <li role="menuitem"><a href="/">← Portfolio</a></li>
                    <li role="menuitem"><a href="/blog/">Blog</a></li>
                </ul>
                <div class="theme-switcher">
                    <button id="theme-toggle" aria-label="Toggle light/dark theme">🌓</button>
                </div>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            {{ content }}
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; {{ 'now' | date: "%Y" }} Rahul Krishnan. All rights reserved. | <a href="/privacy.html">Privacy Policy</a></p>
        </div>
    </footer>

    <script>
        (function () {
            var btn = document.getElementById('theme-toggle');
            if (!btn) return;
            var root = document.documentElement;

            function update(theme) {
                btn.textContent = theme === 'light' ? '🌙' : '🌞';
                btn.setAttribute('aria-label', 'Switch to ' + (theme === 'light' ? 'dark' : 'light') + ' theme');
            }

            var current = root.classList.contains('light') ? 'light' : 'dark';
            update(current);

            btn.addEventListener('click', function () {
                var now = root.classList.contains('light') ? 'light' : 'dark';
                var next = now === 'light' ? 'dark' : 'light';
                root.classList.remove('light', 'dark');
                root.classList.add(next);
                try { localStorage.setItem('theme', next); } catch (e) {}
                update(next);
            });
        })();
    </script>
</body>
</html>
