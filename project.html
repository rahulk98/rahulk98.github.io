<!doctype html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2C109RKXQE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-2C109RKXQE');

    <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project - Rahul Krishnan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <nav class="nav" aria-label="Project">
      <a class="logo" href="index.html#projects">Back to Projects</a>
      <button id="theme-toggle" class="icon-btn" aria-label="Toggle dark mode" title="Toggle theme"></button>
    </nav>
  </header>
  <main class="section" id="main">
    <div class="container">
      <article id="content" class="card" style="padding:24px"></article>
    </div>
  </main>
  <footer class="site-footer">
    <div class="container footer-grid">
      <div>
        <strong>Rahul Krishnan</strong>
        <p class="muted">Built with HTML, CSS and JS</p>
      </div>
    </div>
  </footer>
  <script src="assets/js/main.js" defer></script>
  <script>
  (function(){
    const root = document.documentElement;
    const saved = localStorage.getItem('theme');
    if (saved === 'light') root.classList.add('light');

    const esc = (s) => String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    // Reuse the shared renderDetail() from main.js when it is loaded; inline fallback otherwise.
    function renderDetailInto(project, el){
      if (!el) return;
      if (typeof renderDetail === 'function') { renderDetail(project, el); return; }
      const paras = (project && project.detail) || [];
      el.innerHTML = paras.filter(Boolean).map(p => `<p>${esc(p)}</p>`).join('');
    }

    const params = new URLSearchParams(location.search);
    const slug = params.get('slug') || params.get('id');
    const target = document.getElementById('content');
    if (!slug) { target.innerHTML = '<p class="muted">Project not found.</p>'; return; }

    fetch('assets/data/projects.json')
      .then(r => r.json())
      .then(projects => {
        const project = projects.find(p => p.slug === slug);
        if (!project) {
          document.title = 'Project not found - Rahul Krishnan';
          target.innerHTML = '<p class="muted">Project not found.</p>';
          return;
        }
        document.title = `${project.title} - Rahul Krishnan`;
        const tags = (project.tags && project.tags.length) ? project.tags : (project.stack || []);
        const linkKeys = Object.keys(project.links || {});
        target.innerHTML = `
          ${project.outcome ? `<p class="project-card__outcome">${esc(project.outcome)}</p>` : ''}
          <h1>${esc(project.title)}</h1>
          <p class="project-card__summary">${esc(project.summary || '')}</p>
          <div id="content-detail" class="project-detail"></div>
          <div class="tags">${tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>
          ${linkKeys.length ? `<div class="actions">${Object.entries(project.links).map(([k,v]) =>
            `<a href="${esc(v)}" target="_blank" rel="noopener">${k.charAt(0).toUpperCase()+k.slice(1)}</a>`).join('')}</div>` : ''}
        `;
        renderDetailInto(project, document.getElementById('content-detail'));
      })
      .catch(() => { target.innerHTML = '<p class="muted">Failed to load project.</p>'; });
  })();
  </script>
</body>
</html>
